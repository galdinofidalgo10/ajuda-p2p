<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escritório Virtual | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(184, 134, 11, 0.2); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        .barra-progresso { background: rgba(255,255,255,0.05); border-radius: 10px; height: 8px; overflow: hidden; }
        .progresso-fill { background: linear-gradient(90deg, #b8860b, #fde047); height: 100%; width: 0%; transition: width 1s; }
        #painelConteudo { display: none; }
    </style>
</head>
<body class="p-4">
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-[#020617] z-50">
        <p class="text-yellow-500 font-bold animate-pulse">SINCRONIZANDO REDE...</p>
    </div>

    <div id="painelConteudo" class="max-w-md mx-auto">
        <header class="mb-6 pt-4 flex justify-between items-start">
            <div>
                <h1 class="text-xl font-black text-yellow-500 uppercase italic">Escritório Virtual</h1>
                <p id="nomeExibicao" class="text-[10px] text-white font-bold uppercase font-mono mt-1">Carregando...</p>
            </div>
            <span id="statusBadge" class="text-[9px] font-black uppercase p-1 px-2 glass-card text-yellow-500">Verificando</span>
        </header>

        <div class="glass-card p-6 mb-6 border-t-2 border-yellow-500/30">
            <h2 class="text-[10px] font-black text-center mb-6 uppercase text-white">Sua Evolução Elite</h2>
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[9px] mb-2 font-bold text-yellow-500"><span>Nível 1</span> <span id="txt_n1" class="text-white">0 / 3</span></div>
                    <div class="barra-progresso"><div id="bar_n1" class="progresso-fill"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[9px] mb-2 font-bold text-yellow-500"><span>Nível 2</span> <span id="txt_n2" class="text-white">0 / 9</span></div>
                    <div class="barra-progresso"><div id="bar_n2" class="progresso-fill"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[9px] mb-2 font-bold text-yellow-500"><span>Nível 3</span> <span id="txt_n3" class="text-white">0 / 27</span></div>
                    <div class="barra-progresso"><div id="bar_n3" class="progresso-fill"></div></div>
                </div>
            </div>
        </div>

        <div id="areaLink" class="glass-card p-4 mb-6 hidden">
            <p class="text-[10px] text-yellow-500 font-bold mb-2 text-center uppercase">Seu Link de Convite</p>
            <div class="flex gap-2">
                <input type="text" id="linkConvite" readonly class="w-full bg-black/40 border border-white/5 p-2 rounded text-[10px] text-white outline-none">
                <button onclick="copiar()" class="btn-gold px-4 rounded text-[10px]">COPIAR</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const userUrl = urlParams.get('user');
        if(userUrl) { localStorage.setItem('usuario_nome', decodeURIComponent(userUrl).trim()); }

        let meuNome = localStorage.getItem('usuario_nome');

        database.ref('solicitacoes/').on('value', (snap) => {
            let n1=0, n2=0, n3=0, liberado=false, cadastrado=false;
            const rede = [];
            snap.forEach(c => {
                const u = c.val(); rede.push(u);
                if(u.nome === meuNome) {
                    cadastrado = true;
                    if(u.status === 'liberado') liberado = true;
                }
            });

            if(!cadastrado) { document.getElementById('loading').innerText = "POR FAVOR, FAÇA O CADASTRO."; return; }

            document.getElementById('loading').style.display = "none";
            document.getElementById('painelConteudo').style.display = "block";
            document.getElementById('nomeExibicao').innerText = "Líder: " + meuNome;

            if(liberado) {
                document.getElementById('statusBadge').innerText = "CONTA ATIVA";
                document.getElementById('statusBadge').className = "text-green-500 font-black p-1 px-2 glass-card text-[9px]";
                document.getElementById('areaLink').classList.remove('hidden');
                const baseLink = window.location.origin + window.location.pathname;
                document.getElementById('linkConvite').value = baseLink + "?ref=" + encodeURIComponent(meuNome);
            }

            rede.forEach(u1 => {
                if(u1.indicado_por === meuNome && u1.status === 'liberado') {
                    n1++;
                    rede.forEach(u2 => {
                        if(u2.indicado_por === u1.nome && u2.status === 'liberado') {
                            n2++;
                            rede.forEach(u3 => {
                                if(u3.indicado_por === u2.nome && u3.status === 'liberado') n3++;
                            });
                        }
                    });
                }
            });

            const upd = (id, a, t) => {
                let perc = (a/t*100 > 100 ? 100 : a/t*100);
                document.getElementById('bar_'+id).style.width = perc + "%";
                document.getElementById('txt_'+id).innerText = `${a} / ${t}`;
            };
            upd('n1', n1, 3); upd('n2', n2, 9); upd('n3', n3, 27);
        });

        function copiar() {
            const i = document.getElementById("linkConvite");
            i.select(); navigator.clipboard.writeText(i.value);
            alert("Link copiado!");
        }
    </script>
</body>
</html>
