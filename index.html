<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escritório Virtual | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        .trava-overlay { background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(8px); display: none; }
    </style>
</head>
<body class="p-4">
    <div id="loading" class="text-center py-20 text-yellow-500 font-bold animate-pulse">Sincronizando...</div>

    <div id="painel" class="max-w-md mx-auto hidden">
        <header class="mb-6 pt-4 flex justify-between items-start">
            <h1 class="text-xl font-black text-yellow-500 uppercase italic leading-tight">Escritório<br>Virtual</h1>
            <span id="statusBadge" class="text-[9px] font-black uppercase p-1 px-2 glass-card italic">Verificando</span>
        </header>

        <div id="conteudoProtegido" class="space-y-6">
            <div class="glass-card p-6 text-center border-t-2 border-yellow-500/30">
                <h2 class="text-[10px] font-black mb-4 uppercase tracking-widest italic">Evolução da Rede</h2>
                <div id="statsRede" class="text-xs opacity-50 uppercase">Bloqueado - Aguardando Ativação</div>
            </div>

            <div id="areaLink" class="glass-card p-4 hidden">
                <p class="text-[10px] text-yellow-500 font-bold mb-2 text-center uppercase">Seu Link de Convite</p>
                <input type="text" id="linkConvite" readonly class="w-full bg-black/40 border border-white/5 p-3 rounded text-[10px] text-white outline-none mb-3">
                <button onclick="copiar()" class="btn-gold w-full py-3 rounded text-[10px]">COPIAR LINK</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { /* Sua Configuração Firebase */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const meuNome = urlParams.get('user');

        if(!meuNome) {
            document.getElementById('loading').innerText = "ACESSO NEGADO.";
        } else {
            database.ref('solicitacoes/').on('value', (snap) => {
                let user = null;
                snap.forEach(c => { if(c.val().nome === meuNome) user = c.val(); });

                if(user) {
                    document.getElementById('loading').style.display = "none";
                    document.getElementById('painel').classList.remove('hidden');

                    if(user.status === 'liberado') {
                        document.getElementById('statusBadge').innerText = "CONTA ATIVA";
                        document.getElementById('statusBadge').classList.add('text-green-500');
                        document.getElementById('areaLink').classList.remove('hidden');
                        document.getElementById('linkConvite').value = "https://galdinofidalgo10.github.io/ajuda-mutua/index.html?ref=" + encodeURIComponent(meuNome);
                        document.getElementById('statsRede').innerText = "Acompanhe seus níveis abaixo...";
                    } else {
                        document.getElementById('statusBadge').innerText = "PENDENTE";
                        document.getElementById('statusBadge').classList.add('text-yellow-500');
                    }
                }
            });
        }
        function copiar() { /* Lógica de copiar */ }
    </script>
</body>
</html>
