<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Líder | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(184, 134, 11, 0.2); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        .barra-progresso { background: rgba(255,255,255,0.05); border-radius: 10px; height: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .progresso-fill { background: linear-gradient(90deg, #b8860b, #fde047); height: 100%; width: 0%; transition: width 0.8s ease-in-out; }
    </style>
</head>
<body class="p-4 pb-12">

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-start mb-8 pt-4">
            <div>
                <h1 class="text-xl font-black text-yellow-500 uppercase italic leading-tight">Escritório<br>Virtual</h1>
                <p id="nomeExibicao" class="text-[10px] text-white font-bold uppercase mt-1">Carregando...</p>
                <p id="indicadoPorExibicao" class="text-[9px] text-slate-500 font-bold uppercase italic mt-0.5">Indicado por: ...</p>
            </div>
            <div class="text-right">
                <span id="statusBadge" class="text-slate-500 text-[10px] font-black uppercase">● Verificando</span>
            </div>
        </header>

        <div class="glass-card p-6 mb-6 border-t-4 border-t-yellow-500 shadow-2xl">
            <h2 class="text-[11px] font-black text-white mb-6 uppercase tracking-widest text-center italic">Minha Evolução de Rede</h2>
            
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] mb-2 font-bold uppercase text-yellow-500">
                        <span>1º Nível (Diretos)</span>
                        <span id="txt_n1" class="text-white">0 / 3</span>
                    </div>
                    <div class="barra-progresso"><div id="bar_n1" class="progresso-fill"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-2 font-bold uppercase text-yellow-500">
                        <span>2º Nível (Indiretos)</span>
                        <span id="txt_n2" class="text-white">0 / 9</span>
                    </div>
                    <div class="barra-progresso"><div id="bar_n2" class="progresso-fill"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-2 font-bold uppercase text-yellow-500">
                        <span>3º Nível (Indiretos)</span>
                        <span id="txt_n3" class="text-white">0 / 27</span>
                    </div>
                    <div class="barra-progresso"><div id="bar_n3" class="progresso-fill"></div></div>
                </div>
            </div>
        </div>

        <div id="areaLink" class="glass-card p-5 mb-6 hidden">
            <h2 class="text-[10px] font-black text-yellow-500 mb-3 uppercase text-center italic">Seu Link de Convite</h2>
            <div class="flex gap-2">
                <input type="text" id="linkConvite" readonly class="w-full bg-black/40 border border-white/5 p-3 rounded-lg text-[10px] text-white font-mono">
                <button onclick="copiar()" class="btn-gold px-4 rounded-lg italic text-[10px]">COPIAR</button>
            </div>
        </div>

        <div id="msgAguarde" class="text-center p-6 glass-card mb-6 border border-yellow-500/10">
            <p class="text-yellow-500 font-bold text-[10px] uppercase animate-pulse">Aguardando aprovação do administrador...</p>
        </div>

        <a href="https://wa.me/5598912345678" class="block w-full text-center py-4 glass-card text-[9px] font-black text-slate-500 uppercase tracking-widest border border-white/5">
            Suporte ao Líder Galdino
        </a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Identifica o usuário logado
        let meuNome = localStorage.getItem('usuario_nome');

        // LÓGICA DE SINCRONIZAÇÃO EM TEMPO REAL
        database.ref('solicitacoes/').on('value', (snap) => {
            let n1 = 0, n2 = 0, n3 = 0;
            let statusLiberado = false;
            let quemMeIndicou = "Direto";

            const rede = [];
            snap.forEach(child => {
                const u = child.val();
                rede.push(u);
                
                // Busca meus dados para saber meu status e quem me indicou
                if(u.nome === meuNome) {
                    if(u.status === 'liberado') statusLiberado = true;
                    if(u.indicado_por) quemMeIndicou = u.indicado_por;
                }
            });

            // Atualiza cabeçalho
            document.getElementById('nomeExibicao').innerText = "Líder: " + meuNome;
            document.getElementById('indicadoPorExibicao').innerText = "Indicado por: " + quemMeIndicou;

            if(statusLiberado) {
                document.getElementById('statusBadge').innerText = "● Conta Ativa";
                document.getElementById('statusBadge').className = "text-green-500 text-[10px] font-black uppercase";
                document.getElementById('areaLink').classList.remove('hidden');
                document.getElementById('msgAguarde').classList.add('hidden');
                document.getElementById('linkConvite').value = window.location.href.split('membro.html')[0] + "index.html?ref=" + encodeURIComponent(meuNome);
            }

            // CONTADOR DE REDE (P2P)
            rede.forEach(u1 => {
                if(u1.indicado_por === meuNome && u1.status === 'liberado') {
                    n1++; // Nível 1
                    rede.forEach(u2 => {
                        if(u2.indicado_por === u1.nome && u2.status === 'liberado') {
                            n2++; // Nível 2
                            rede.forEach(u3 => {
                                if(u3.indicado_por === u2.nome && u3.status === 'liberado') {
                                    n3++; // Nível 3
                                }
                            });
                        }
                    });
                }
            });

            atualizarBarra('n1', n1, 3);
            atualizarBarra('n2', n2, 9);
            atualizarBarra('n3', n3, 27);
        });

        function atualizarBarra(id, atual, total) {
            let p = (atual / total) * 100;
            document.getElementById('bar_' + id).style.width = (p > 100 ? 100 : p) + "%";
            document.getElementById('txt_' + id).innerText = `${atual} / ${total}`;
        }

        function copiar() {
            const i = document.getElementById("linkConvite");
            i.select();
            navigator.clipboard.writeText(i.value);
            alert("Link de indicação copiado!");
        }
    </script>
</body>
</html>
