<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escritório Virtual | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(184, 134, 11, 0.2); border-radius: 20px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; }
        .barra-progresso { background: rgba(255,255,255,0.05); border-radius: 10px; height: 8px; overflow: hidden; }
        .progresso-fill { background: linear-gradient(90deg, #b8860b, #fde047); height: 100%; width: 0%; transition: width 1s; }
        #painelConteudo { display: none; } /* Oculto até confirmar o usuário */
    </style>
</head>
<body class="p-4">
    
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-[#020617] z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-yellow-500 mb-4"></div>
            <p class="text-yellow-500 font-bold uppercase text-[10px] tracking-widest">Sincronizando Rede Elite...</p>
        </div>
    </div>

    <div id="painelConteudo" class="max-w-md mx-auto">
        <header class="mb-6 pt-4 flex justify-between items-start">
            <div>
                <h1 class="text-xl font-black text-yellow-500 uppercase italic leading-tight">Escritório<br>Virtual</h1>
                <p id="nomeExibicao" class="text-[10px] text-white font-bold uppercase italic mt-1 font-mono">Carregando...</p>
                <p id="indicadoPorExibicao" class="text-[9px] text-slate-500 font-bold uppercase italic">Indicado por: ...</p>
            </div>
            <span id="statusBadge" class="text-[9px] font-black uppercase p-1 px-2 glass-card text-yellow-500 italic">Verificando</span>
        </header>

        <div class="glass-card p-6 mb-6 border-t-2 border-yellow-500/30 shadow-2xl">
            <h2 class="text-[10px] font-black text-center mb-6 uppercase tracking-widest text-white italic">Sua Evolução Elite</h2>
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[9px] mb-2 font-bold uppercase text-yellow-500 italic">
                        <span>Nível 1 (Diretos)</span> <span id="txt_n1" class="text-white">0 / 3</span>
                    </div>
                    <div class="barra-progresso"><div id="bar_n1" class="progresso-fill"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[9px] mb-2 font-bold uppercase text-yellow-500 italic">
                        <span>Nível 2 (Indiretos)</span> <span id="txt_n2" class="text-white">0 / 9</span>
                    </div>
                    <div class="barra-progresso"><div id="bar_n2" class="progresso-fill"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[9px] mb-2 font-bold uppercase text-yellow-500 italic">
                        <span>Nível 3 (Indiretos)</span> <span id="txt_n3" class="text-white">0 / 27</span>
                    </div>
                    <div class="barra-progresso"><div id="bar_n3" class="progresso-fill"></div></div>
                </div>
            </div>
        </div>

        <div id="areaLink" class="glass-card p-4 mb-6 hidden border border-yellow-500/20">
            <p class="text-[10px] text-yellow-500 font-bold mb-2 text-center uppercase italic">Seu Link de Convite</p>
            <div class="flex gap-2">
                <input type="text" id="linkConvite" readonly class="w-full bg-black/40 border border-white/5 p-2 rounded text-[10px] text-white font-mono outline-none">
                <button onclick="copiar()" class="btn-gold px-4 rounded text-[10px] italic">COPIAR</button>
            </div>
        </div>

        <div id="msgAguarde" class="text-center p-4 glass-card mb-6 border border-yellow-500/20">
            <p class="text-yellow-500 font-bold text-[10px] uppercase animate-pulse">Aguardando ativação do administrador...</p>
        </div>

        <div class="text-center py-4 glass-card text-[8px] font-black text-slate-500 uppercase tracking-widest border border-white/5">
            Suporte Protocolo Elite
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCZIP0M0M8FqC_LAtI9I36e_IIn_V-C4m4",
            authDomain: "ajuda-mutua-7d99a.firebaseapp.com",
            databaseURL: "https://ajuda-mutua-7d99a-default-rtdb.firebaseio.com",
            projectId: "ajuda-mutua-7d99a",
            storageBucket: "ajuda-mutua-7d99a.appspot.com",
            appId: "1:1070775313117:web:fa90f5f0cb519ab38b1d34"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // MECANISMO DE CAPTURA AUTOMÁTICA
        const urlParams = new URLSearchParams(window.location.search);
        const userUrl = urlParams.get('user');
        
        if(userUrl) {
            localStorage.setItem('usuario_nome', decodeURIComponent(userUrl).trim());
            // Limpa a URL para ficar limpo
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        let meuNome = localStorage.getItem('usuario_nome');

        // ESCUTA O BANCO DE DADOS
        database.ref('solicitacoes/').on('value', (snap) => {
            let n1=0, n2=0, n3=0, liberado=false, padrinho="Direto", cadastrado = false;
            const rede = [];
            
            snap.forEach(c => {
                const u = c.val(); 
                rede.push(u);
                if(u.nome === meuNome) {
                    cadastrado = true;
                    if(u.status === 'liberado') liberado = true;
                    if(u.indicado_por) padrinho = u.indicado_por;
                }
            });

            // Se o Firebase carregou e o usuário não existe no banco, volta pro cadastro
            if (!cadastrado && snap.exists()) {
                console.log("Usuário não encontrado no Firebase.");
                // Só redireciona se não estiver em processo de carregamento via URL
                if(!userUrl) {
                   // Se quiser que ele volte pro cadastro, descomente a linha abaixo:
                   // window.location.href = "cadastro.html"; 
                }
                return; 
            }

            // Exibe o painel e remove o loading
            document.getElementById('loading').style.display = "none";
            document.getElementById('painelConteudo').style.display = "block";
            
            document.getElementById('nomeExibicao').innerText = "Líder: " + meuNome;
            document.getElementById('indicadoPorExibicao').innerText = "Indicado por: " + padrinho;

            if(liberado) {
                document.getElementById('statusBadge').innerText = "CONTA ATIVA";
                document.getElementById('statusBadge').className = "text-green-500 font-black p-1 px-2 glass-card italic text-[9px]";
                document.getElementById('areaLink').classList.remove('hidden');
                document.getElementById('msgAguarde').classList.add('hidden');
                
                // Gera o link de convite apontando para a raiz do seu site
                const baseLink = window.location.origin + window.location.pathname;
                document.getElementById('linkConvite').value = baseLink + "?ref=" + encodeURIComponent(meuNome);
            }

            // LÓGICA DE CONTAGEM DA REDE P2P
            rede.forEach(u1 => {
                if(u1.indicado_por === meuNome && u1.status === 'liberado') {
                    n1++; 
                    rede.forEach(u2 => {
                        if(u2.indicado_por === u1.nome && u2.status === 'liberado') {
                            n2++; 
                            rede.forEach(u3 => {
                                if(u3.indicado_por === u2.nome && u3.status === 'liberado') n3++;
                            });
                        }
                    });
                }
            });

            const upd = (id, a, t) => {
                let perc = (a/t*100 > 100 ? 100 : a/t*100);
                document.getElementById('bar_'+id).style.width = perc + "%";
                document.getElementById('txt_'+id).innerText = `${a} / ${t}`;
            };
            upd('n1', n1, 3); upd('n2', n2, 9); upd('n3', n3, 27);
        });

        function copiar() {
            const i = document.getElementById("linkConvite");
            i.select();
            navigator.clipboard.writeText(i.value);
            alert("Link de convite copiado!");
        }
    </script>
</body>
</html>
