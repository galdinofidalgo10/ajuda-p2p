<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escritório Virtual | Protocolo Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Montserrat', sans-serif; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 24px; }
        .btn-gold { background: linear-gradient(135deg, #b8860b 0%, #fde047 100%); color: #000; font-weight: 900; text-transform: uppercase; }
        
        #toast { visibility: hidden; min-width: 250px; background: linear-gradient(135deg, #b8860b, #fde047); color: #000; text-align: center; border-radius: 50px; padding: 15px; position: fixed; z-index: 100; left: 50%; bottom: 40px; transform: translateX(-50%); font-weight: 900; font-size: 11px; }
        #toast.show { visibility: visible; animation: fadeInUp 0.5s; }
        @keyframes fadeInUp { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
    </style>
</head>
<body class="p-4">

    <div id="toast">LINK COPIADO COM SUCESSO!</div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h1 class="text-2xl font-black text-yellow-500 italic uppercase leading-none">Elite Desk</h1>
                <p id="nomeUsuario" class="text-[9px] text-slate-400 font-bold uppercase mt-1 italic italic">Acesso Liberado</p>
            </div>
            <div class="text-[9px] font-black uppercase p-1 px-3 bg-green-500/20 text-green-500 border border-green-500/30 rounded-full">Ativo</div>
        </header>

        <div class="space-y-6">
            <div class="glass-card p-6 border-t-4 border-t-yellow-500 shadow-2xl">
                <h3 class="text-yellow-500 font-black text-[10px] uppercase mb-4 tracking-widest text-center italic">Sua Rede de Ajuda Mútua</h3>
                <div class="grid grid-cols-3 gap-2">
                    <div class="text-center p-3 bg-white/5 rounded-2xl border border-white/5 italic">
                        <p class="text-[7px] text-slate-500 uppercase mb-1">Nível 1</p>
                        <p class="text-[10px] font-black text-white uppercase italic">Liberado</p>
                    </div>
                    <div class="text-center p-3 bg-white/5 rounded-2xl border border-white/5 italic">
                        <p class="text-[7px] text-slate-500 uppercase mb-1">Nível 2</p>
                        <p class="text-[10px] font-black text-white uppercase italic">Liberado</p>
                    </div>
                    <div class="text-center p-3 bg-white/5 rounded-2xl border border-white/5 italic">
                        <p class="text-[7px] text-slate-500 uppercase mb-1">Nível 3</p>
                        <p class="text-[10px] font-black text-white uppercase italic">Liberado</p>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 bg-yellow-500/5 border-yellow-500/30 text-center">
                <p class="text-[9px] text-yellow-500 font-black uppercase tracking-widest mb-4 italic italic">Seu Link Profissional de Expansão</p>
                
                <div class="relative mb-4">
                    <input type="text" id="linkFinal" readonly class="w-full bg-black/60 border border-yellow-500/20 p-5 rounded-2xl text-[10px] text-white text-center font-mono outline-none shadow-inner">
                </div>

                <button onclick="copiarLink()" class="btn-gold w-full py-5 rounded-2xl text-[11px] shadow-lg shadow-yellow-500/20 active:scale-95 transition-all">
                    Copiar Link e Iniciar Rede
                </button>
                
                <p class="text-[8px] text-slate-500 uppercase font-bold mt-4 tracking-tighter">
                    Envie seu link para novos membros e cresça sua rede.
                </p>
            </div>
        </div>
    </div>

    <script>
        // Pega o nome do usuário na URL vindo do seu Zap
        const params = new URLSearchParams(window.location.search);
        const userURL = params.get('user') || "Membro Elite";

        // Preenche os dados na tela imediatamente
        document.getElementById('nomeUsuario').innerText = "Membro: " + userURL;
        
        // Gera o link de convite apontando de volta para o cadastro
        const linkConvite = "https://galdinofidalgo10.github.io/ajuda-mutua/index.html?ref=" + encodeURIComponent(userURL);
        document.getElementById('linkFinal').value = linkConvite;

        function copiarLink() {
            const link = document.getElementById('linkFinal');
            link.select();
            link.setSelectionRange(0, 99999); // Para mobile
            document.execCommand('copy');
            
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        }
    </script>
</body>
</html>
